<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<link rel="preconnect" href="https://cdn.sanity.io" crossorigin />
		<link rel="dns-prefetch" href="https://cdn.sanity.io" />
		<!-- These two must stay above the head block below. Stylesheets are inlined (see
		     inlineStyleThreshold in svelte.config.js), which drops ~80KB of CSS into that
		     block — far enough that a font hint placed after it is discovered too late to
		     meet the ~100ms block period `font-display: optional` allows, and the fallback
		     face is then locked in for the whole page view rather than swapping when the
		     font lands. Moving these below the block silently reverts the site to Georgia
		     and Arial. -->
		<link rel="preload" href="/fonts/libre-franklin-latin.woff2" as="font" type="font/woff2" crossorigin />
		<link rel="preload" href="/fonts/playfair-display-latin.woff2" as="font" type="font/woff2" crossorigin />
		<!-- The head block carries the page's own LCP image preload, so it goes ahead of
		     the ~120KB GTM bundle below: the tag bundle is then discovered afterwards and
		     queues behind the image rather than racing it on a throttled connection.

		     Never write a placeholder token inside a comment here. Replacement is a plain
		     string substitution, so the markup lands inside the comment, and the first
		     Svelte hydration marker in it carries a comment-close sequence that ends this
		     comment early and spills the rest onto the page as visible text. -->
		%sveltekit.head%
		<!-- Consent defaults + GTM, injected server-side so they run before any Google
		     tag. Replaced by analyticsHandle in hooks.server.ts (an HTML comment when
		     analytics is gated off). Must stay in <head>: the hook does a plain string
		     replace, which relies on this landing in the first streamed chunk. -->
		%ghi.analytics%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
